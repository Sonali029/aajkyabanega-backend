name: Auto-Schedule Meals

# Runs every 15 minutes to check if any families need meal scheduling
# This replaces Firebase Scheduled Functions (which require Blaze plan)
# HTTPS Functions work on free Spark plan ✅
on:
  schedule:
    # Every 15 minutes (cron is in UTC)
    # Covers all IST hours to ensure meals are scheduled on time
    - cron: '*/15 * * * *'

  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  schedule-meals:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Auto-Scheduler Function
        run: |
          echo "🚀 Triggering auto-scheduler at $(date)"

          # Call the Vercel serverless function
          # TODO: Replace this URL with your actual Vercel deployment URL after deploying
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            https://YOUR_VERCEL_PROJECT.vercel.app/api/auto-schedule \
            -H "Content-Type: application/json")

          # Extract HTTP status code and body
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "📊 Response: $body"
          echo "Status Code: $http_code"

          # Check if request was successful
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Auto-scheduler completed successfully"
          else
            echo "❌ Auto-scheduler failed with status $http_code"
            exit 1
          fi

      - name: Log Completion
        if: always()
        run: echo "🏁 Workflow completed at $(date)"
